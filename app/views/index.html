<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUDO</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Sofia">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/index.css">
    <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon/favicon-16x16.png">
    <link rel="manifest" href="../images/favicon/site.webmanifest">
    <meta name="msapplication-config" content="../images/favicon/browserconfig.xml" />
    <meta name="msapplication-TileColor" content="000000">
    <meta name="theme-color" content="000000">
</head>
<body>

    <!-- NAVBAR -->
    <div class="navBar">
        <a href="">HOME</a>
        <a onclick="register()">LUDO</a>
        <a href="about">ABOUT</a>
    </div>

    <!-- MODAL: JOIN / CREATE -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 class="modal-title">🎲 Choose Mode</h3>
            <form autocomplete="off" name="TheForm" action="/" method="POST">
                <div class="mode-options">
                    <label class="mode-card" id="label-join">
                        <input type="radio" name="action_to_do" id="JOIN" value="join" required onclick="ShowHideDiv()">
                        <div class="mode-icon">🔗</div>
                        <div class="mode-text">JOIN</div>
                        <div class="mode-sub">دوست ظو روم میں شامل کریں</div>
                    </label>
                    <label class="mode-card" id="label-create">
                        <input type="radio" name="action_to_do" id="CREATE" value="create" required onclick="ShowHideDiv()">
                        <div class="mode-icon">➕</div>
                        <div class="mode-text">CREATE</div>
                        <div class="mode-sub">نیا room بناؤ</div>
                    </label>
                </div>

                <div id="room_code" style="display:none;" class="room-input-wrap">
                    <label for="joinroom" class="room-label">🔑 Secret Room Code</label>
                    <input type="text" name="roomcode" id="roomcodeID" size="6"
                        pattern="[A-Za-z0-9]{6}" title="Six letter room code"
                        placeholder="ABC123" class="room-input">
                </div>

                <button type="submit" id="start" class="play-btn">▶ PLAY NOW</button>
            </form>
        </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
        <!-- Floating dice decorations -->
        <div class="float-dice d1">⚁</div>
        <div class="float-dice d2">⚄</div>
        <div class="float-dice d3">⚂</div>
        <div class="float-dice d4">⚅</div>

        <div class="hero-content">
            <div class="logo-wrap">
                <span class="logo-l">L</span>
                <span class="logo-u">U</span>
                <span class="logo-d">D</span>
                <span class="logo-o">O</span>
            </div>
            <p class="hero-sub">Online · Offline · 4 Players</p>

            <div class="color-pills">
                <span class="pill green">🟢</span>
                <span class="pill red">🔴</span>
                <span class="pill blue">🔵</span>
                <span class="pill yellow">🟡</span>
            </div>

            <p class="hero-desc">
                Node.js اور Socket.io پر بنا ہوا real-time<br>
                Ludo game — 4 کھلاڑیوں کے ساتھ!
            </p>

            <div class="mode-btns-wrap">
                <button type="button" class="main-play-btn online-btn" onclick="register()">
                    🌐 Online کھیلو
                </button>
                <button type="button" class="main-play-btn offline-btn" onclick="window.location.href='/offline'">
                    📱 Offline کھیلو
                </button>
            </div>
        </div>
    </div>

    <script src="../js/index.js"></script>
</body>
</html>
