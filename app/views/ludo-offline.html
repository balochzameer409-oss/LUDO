<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDO - Offline</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Sofia">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/ludo.css">
    <link rel="stylesheet" href="../style/dice.css">
    <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon/favicon-16x16.png">
    <link rel="manifest" href="../images/favicon/site.webmanifest">
    <meta name="msapplication-TileColor" content="000000">
    <meta name="theme-color" content="000000">

    <style>

.gameWrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-top -45px;
    height: 100vh;
}
        #pass-screen.show { display: flex; }
        #pass-screen .pass-icon { font-size: 80px; margin-bottom: 16px; animation: popIn 0.4s ease; }
        #pass-screen .pass-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: #fff;
            margin-bottom: 8px;
        }
        #pass-screen .pass-name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 0 0 20px currentColor;
        }
        #pass-screen .pass-sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
            font-family: sans-serif;
        }
        #pass-screen .pass-btn {
            padding: 16px 48px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.25s;
        }
        /* Player select modal */
        #player-select-modal {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.88);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 24px;
        }
        #player-select-modal h2 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 20px;
            margin-bottom: 8px;
        }
        #player-select-modal p {
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
            font-family: sans-serif;
        }
        .player-count-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .player-count-btn {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
        }
        .player-count-btn span { font-size: 11px; color: #888; margin-top: 4px; font-family: sans-serif; }
        .player-count-btn:hover {
            border-color: #00c853;
            background: rgba(0,200,83,0.12);
            transform: translateY(-3px);
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
    </style>
</head>

<body onclick="if(window.LudoSound)LudoSound.unlock();" 
      ontouchstart="if(window.LudoSound)LudoSound.unlock();">
    <!-- Player Count Select -->
    <div id="player-select-modal">
        <h2>📱 Offline Mode</h2>
        <p>کتنے کھلاڑی کھیلیں گے؟</p>
        <div class="player-count-btns">
            <button class="player-count-btn" onclick="startOffline(2)">2<span>کھلاڑی</span></button>
            <button class="player-count-btn" onclick="startOffline(3)">3<span>کھلاڑی</span></button>
            <button class="player-count-btn" onclick="startOffline(4)">4<span>کھلاڑی</span></button>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h3 id="win-text" style="color:#ffd600;font-size:22px;margin-bottom:16px;"></h3>
            <button id="HOME" onclick='window.location.replace("/");' style="margin-right:8px;">🏠 HOME</button>
            <button onclick='window.location.reload();'>🔄 دوبارہ کھیلو</button>
        </div>
    </div>

  <!-- MAIN LAYOUT -->
    <div class="gameWrapper">

        <div class="corners-row top-row">
            <div class="corner-box corner-green" id="corner-0">
               
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-0" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-0">Waiting...</div>
            </div>
            <div class="corner-box corner-red" id="corner-1">
                
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-1" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-1">Waiting...</div>
            </div>
        </div>

        <div class="gameBoard">
            <img src="../images/LUDO_BOARD.svg" alt="LUDO BOARD" class="ludoImg">
            <canvas class="gameCanvas" id="theCanvas"></canvas>
        </div>

        <div class="corners-row bottom-row">
            <div class="corner-box corner-yellow" id="corner-3">
                
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-3" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-3">Waiting...</div>
            </div>
            <div class="corner-box corner-blue" id="corner-2">
                
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-2" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-2">Waiting...</div>
            </div>
        </div>

        <div class="msgBoard">
            <div class="messageFromServer"><strong>📱 Offline Mode — باری باری کھیلو!</strong></div>
        </div>

    </div>

    <div style="display:none">
        <div class="dice disabled" id="randomButt" data-num="6">
            <span class="dot a"></span><span class="dot b"></span>
            <span class="dot c"></span><span class="dot d"></span>
            <span class="dot e"></span><span class="dot f"></span>
            <span class="dot g"></span>
        </div>
    </div>

    <script src="../js/ludo-sound.js"></script>
    <script src="../js/ludo-offline.js"></script>
    
</body>
</html>
