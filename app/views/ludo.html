<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDO</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Sofia">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/ludo.css">
    <link rel="stylesheet" href="../style/dice.css">
    <link rel="stylesheet" href="../style/share_styles.css">

    <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon/favicon-16x16.png">
    <link rel="manifest" href="../images/favicon/site.webmanifest">
    <meta name="msapplication-config" content="../images/favicon/browserconfig.xml" />
    <meta name="msapplication-TileColor" content="000000">
    <meta name="theme-color" content="000000">
</head>
<body onclick="if(window.LudoSound)LudoSound.unlock();" 
      ontouchstart="if(window.LudoSound)LudoSound.unlock();">
    <div class="navBar">
        <a href="">HOME</a>
        <a href="">LUDO</a>
        <a href="about">ABOUT</a>
        <button class="share-nav-btn" onclick="document.getElementById('share-modal').style.display='flex'">🔗 Share</button>
    </div>

    <!-- JS کے لیے hidden - ضروری ہیں -->
    <div style="display:none">
        <h3 id="my-name"></h3>
        <textarea id="copy"></textarea>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal" style="display:none; justify-content:center; align-items:center;">
        <div class="share-box">
            <div class="share-header">
                <span>🎲 دوستوں کو دعوت دیں!</span>
                <button class="share-close" onclick="document.getElementById('share-modal').style.display='none'">✕</button>
            </div>
            <div class="share-code-section">
                <div class="share-code-label">ROOM CODE</div>
                <div class="share-code" id="share-room-code">------</div>
                <button class="share-copy-code" onclick="shareAction('code')">📋 Copy Code</button>
            </div>
            <div class="share-or">— یا —</div>
            <div class="share-code-label">ROOM LINK</div>
            <div class="share-link" id="share-link-text"></div>
            <div class="share-btns">
                <button class="share-btn-link" onclick="shareAction('link')">🔗 Copy Link</button>
                <button class="share-btn-wa" onclick="shareAction('whatsapp')">💬 WhatsApp</button>
            </div>
            <div class="share-msg" id="share-msg"></div>
        </div>
    </div>

    <!-- پرانا modal hidden رکھو -->
    <div id="myModal-1" class="modal" style="display:none!important"></div>

    <!-- نیا ranking modal -->
    <div id="rank-modal" class="modal">
        <div class="rank-modal-content">
            <div class="rank-trophy">🏆</div>
            <h2 class="rank-title">گیم ختم!</h2>
            <div id="rank-list"></div>
            <div class="rank-btns">
                <button class="rank-home-btn" onclick='window.location.replace("/");'>🏠 HOME</button>
                <button class="rank-play-btn" onclick='window.location.replace(window.location.href);'>🔄 دوبارہ</button>
            </div>
        </div>
    </div>
    <div id="myModal-2" class="modal">
        <div class="modal-content" style="margin: 15% auto;">
            <h3 id="resume">Resume the game without <span id="theOneWhoLeft"></span><span id="seconds"> in 10</span>.</h3>
            <button id="RESUME">RESUME</button>
            <button id="WAIT">WAIT</button>
            <br>
        </div>  
    </div>

    <!-- MAIN LAYOUT -->
    <div class="gameWrapper">

        <!-- TOP ROW: Green + Red -->
        <div class="corners-row top-row">
            <div class="corner-box corner-green" id="corner-0">
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-0" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-0">Waiting...</div>
            </div>
            <div class="corner-box corner-red" id="corner-1">
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-1" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-1">Waiting...</div>
            </div>
        </div>

        <!-- BOARD -->
        <div class="gameBoard">
            <img src="../images/LUDO_BOARD.svg" alt="LUDO BOARD" class="ludoImg">
            <canvas class="gameCanvas" id="theCanvas"></canvas>
        </div>

        <!-- BOTTOM ROW: Yellow + Blue -->
        <div class="corners-row bottom-row">
            <div class="corner-box corner-yellow" id="corner-3">
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-3" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-3">Waiting...</div>
            </div>
            <div class="corner-box corner-blue" id="corner-2">
                <div class="dice-corner-wrap">
                    <div class="dice corner-dice disabled" id="dice-2" data-num="6">
                        <span class="dot a"></span><span class="dot b"></span>
                        <span class="dot c"></span><span class="dot d"></span>
                        <span class="dot e"></span><span class="dot f"></span>
                        <span class="dot g"></span>
                    </div>
                </div>
                <div class="corner-msg" id="cmsg-2">Waiting...</div>
            </div>
        </div>

        <!-- Message Log -->
        <div class="msgBoard">
            <div class="messageFromServer"><strong>LET US START THE GAME!!!</strong></div>
        </div>

    </div>

    <!-- Hidden original dice (JS compatibility) -->
    <div style="display:none">
        <div class="dice disabled" id="randomButt" data-num="6">
            <span class="dot a"></span><span class="dot b"></span>
            <span class="dot c"></span><span class="dot d"></span>
            <span class="dot e"></span><span class="dot f"></span>
            <span class="dot g"></span>
        </div>
    </div>

    <script>
    function shareAction(type) {
        var code = window.location.href.slice(-6);
        var link = window.location.href;
        var msg  = document.getElementById('share-msg');
        if (type === 'code') {
            navigator.clipboard.writeText(code);
            msg.textContent = '✅ Code copy ہو گیا!';
        } else if (type === 'link') {
            navigator.clipboard.writeText(link);
            msg.textContent = '✅ Link copy ہو گیا!';
        } else if (type === 'whatsapp') {
            var text = 'چلو Ludo کھیلتے ہیں! 🎲\nRoom Code: ' + code + '\n' + link;
            window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
        }
        if (msg) setTimeout(function(){ msg.textContent = ''; }, 2000);
    }
    function initShare() {
        var code = window.location.href.slice(-6);
        var el = document.getElementById('share-room-code');
        var lk = document.getElementById('share-link-text');
        if (el) el.textContent = code;
        if (lk) lk.textContent = window.location.href;
        document.getElementById('share-modal').style.display = 'flex';
    }
    </script>
    <script src='../../socket.io/socket.io.js'></script>
    <script src="../js/ludo.js"></script>
    <script src="../js/dice-sync.js"></script>
</body>
</html>
