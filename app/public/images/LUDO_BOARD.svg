
<svg width="750" height="750" viewBox="0 0 750 750" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Home zone fills -->
  <linearGradient id="gHome" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#6abf7a"/>
    <stop offset="100%" stop-color="#2e8b4a"/>
  </linearGradient>
  <linearGradient id="rHome" x1="450" y1="0" x2="750" y2="300" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#f07080"/>
    <stop offset="100%" stop-color="#d93040"/>
  </linearGradient>
  <linearGradient id="yHome" x1="0" y1="450" x2="300" y2="750" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#ffe030"/>
    <stop offset="100%" stop-color="#f0b000"/>
  </linearGradient>
  <linearGradient id="bHome" x1="450" y1="450" x2="750" y2="750" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#6aabf0"/>
    <stop offset="100%" stop-color="#2060d0"/>
  </linearGradient>

  <!-- Track cell colors -->
  <linearGradient id="wCell" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#b0b0b0"/>
    <stop offset="100%" stop-color="#f0f0f0"/>
  </linearGradient>

  <!-- Safe cell colors -->
  <linearGradient id="gSafe" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#2e9e30"/>
    <stop offset="100%" stop-color="#1a6e20"/>
  </linearGradient>
  <linearGradient id="rSafe" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#d03030"/>
    <stop offset="100%" stop-color="#a01010"/>
  </linearGradient>
  <linearGradient id="bSafe" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#1a70d0"/>
    <stop offset="100%" stop-color="#0a40a0"/>
  </linearGradient>
  <linearGradient id="ySafe" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#e0c000"/>
    <stop offset="100%" stop-color="#b09000"/>
  </linearGradient>

  <!-- Home path colors -->
  <linearGradient id="gPath" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#2a9040"/>
    <stop offset="100%" stop-color="#308040"/>
  </linearGradient>
  <linearGradient id="rPath" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#d03050"/>
    <stop offset="100%" stop-color="#c03050"/>
  </linearGradient>
  <linearGradient id="bPath" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#1a60d0"/>
    <stop offset="100%" stop-color="#1050b0"/>
  </linearGradient>
  <linearGradient id="yPath" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#ffe030"/>
    <stop offset="100%" stop-color="#e0c000"/>
  </linearGradient>

  <!-- Center star gradient -->
  <radialGradient id="cCenter" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffe030"/>
    <stop offset="60%" stop-color="#f0b000"/>
    <stop offset="100%" stop-color="#b07800"/>
  </radialGradient>

  <!-- Subtle shadow -->
  <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#00000022"/>
  </filter>

  <!-- Piece slot pattern -->
  <filter id="inset" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000033" result="shadow"/>
  </filter>
</defs>

<!-- ======== BACKGROUND ======== -->
<rect x="0" y="0" width="750" height="750" rx="16" fill="#d0d0c8"/>

